<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>박정자 여사님 칠순 잔치</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/cafe24/cff-fonts@main/css/cafe24-ssurroundair.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; }
body {
  background: #fff9f5;
  font-family: 'Noto Sans KR', sans-serif;
  display: flex; align-items: center; justify-content: center;
  padding: 2rem 1rem;
  min-height: 100vh;
}

/* 꽃잎 */
.petals {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; overflow: hidden; z-index: 0;
}
.petal {
  position: absolute; top: -30px;
  animation: fall linear infinite;
}
@keyframes fall {
  0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0.85; }
  100% { transform: translateY(100vh) rotate(400deg) translateX(50px); opacity: 0; }
}

/* 카드 */
.card {
  position: relative; z-index: 1;
  background: rgba(255,255,255,0.93);
  backdrop-filter: blur(10px);
  border-radius: 28px;
  max-width: 400px; width: 100%;
  overflow: hidden;
  box-shadow: 0 12px 48px rgba(220,130,130,0.18);
  border: 1px solid rgba(255,182,193,0.3);
}

/* 헤더 */
.header {
  background: linear-gradient(160deg, #ffb7c5 0%, #ffd6e0 40%, #ffe8d6 100%);
  padding: 2.5rem 1.5rem 2rem;
  text-align: center;
  position: relative;
}
.header-icon { font-size: 52px; display: block; margin-bottom: 0.75rem; }
.header-deco {
  font-size: 13px; letter-spacing: 0.3em; color: #c06080;
  margin-bottom: 0.5rem;
  font-family: 'Noto Sans KR', sans-serif;
}
.header-name {
  font-size: 34px; font-weight: 800; color: #8b2252;
  margin-bottom: 0.2rem;
  text-shadow: 0 2px 8px rgba(200,80,120,0.15);
  font-family: 'Cafe24 Ssurround Air', 'Noto Sans KR', sans-serif;
}
.header-title {
  font-size: 17px; color: #c06080; letter-spacing: 0.08em;
  font-family: 'Cafe24 Ssurround Air', 'Noto Sans KR', sans-serif;
}
.header-bday {
  display: inline-block;
  background: rgba(255,255,255,0.35);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: 20px;
  padding: 4px 18px;
  font-size: 13px; color: #9b3060;
  margin-top: 0.75rem;
  font-family: 'Noto Sans KR', sans-serif;
}

/* 본문 */
.body { padding: 1.75rem 1.5rem; }

.poem {
  text-align: center;
  font-size: 15px; line-height: 2.1;
  color: #a05070;
  background: #fff0f3;
  border-radius: 16px;
  padding: 1.25rem;
  margin-bottom: 1.5rem;
  border-left: 3px solid #ffb7c5;
  font-family: 'Cafe24 Ssurround Air', 'Noto Sans KR', sans-serif;
}

.info-wrap { margin-bottom: 1.5rem; }
.info-item {
  display: flex; align-items: center; gap: 12px;
  padding: 0.75rem 0;
  border-bottom: 1px dashed #ffd0da;
}
.info-item:last-child { border-bottom: none; }
.info-emoji { font-size: 24px; width: 32px; text-align: center; }
.info-text {
  font-size: 17px; color: #6b3050; line-height: 1.4;
  font-family: 'Cafe24 Ssurround Air', 'Noto Sans KR', sans-serif;
}
.info-text b { color: #8b2252; font-size: 18px; }

.q-text {
  font-size: 21px; color: #8b2252;
  text-align: center; margin-bottom: 1rem;
  font-family: 'Cafe24 Ssurround Air', 'Noto Sans KR', sans-serif;
}
.q-sub {
  font-size: 14px; color: #c08090;
  text-align: center; margin-bottom: 1.25rem;
  font-family: 'Noto Sans KR', sans-serif;
}

/* 인원 선택 */
.count-select {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 1rem;
}
.count-select button {
  padding: 16px 8px;
  background: #fff0f3;
  color: #8b2252;
  border: 2px solid #ffb7c5;
  border-radius: 16px;
  font-size: 17px;
  font-family: 'Cafe24 Ssurround Air', 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
}
.count-select button .cnt-icon { font-size: 26px; }
.count-select button.selected {
  background: #ff8fab;
  color: #fff;
  border-color: #ff8fab;
  box-shadow: 0 4px 14px rgba(255,100,130,0.35);
  transform: scale(1.04);
}
.count-select button:hover:not(.selected) { background: #ffe0e8; }

.btn-sound {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #ffb7c5, #ff8fab);
  color: #fff; border: none; border-radius: 50px;
  font-size: 17px; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; margin-bottom: 1rem;
  box-shadow: 0 4px 16px rgba(255,100,130,0.3);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-yes {
  width: 100%; padding: 20px;
  background: linear-gradient(135deg, #51cf66, #2f9e44);
  color: #fff; border: none; border-radius: 18px;
  font-size: 21px;
  font-family: 'Cafe24 Ssurround Air', 'Noto Sans KR', sans-serif;
  cursor: pointer; margin-bottom: 10px;
  box-shadow: 0 4px 16px rgba(40,167,69,0.3);
  display: flex; align-items: center; justify-content: center; gap: 10px;
  opacity: 0.5; pointer-events: none;
  transition: opacity 0.2s;
}
.btn-yes.enabled { opacity: 1; pointer-events: all; }
.btn-no {
  width: 100%; padding: 16px;
  background: #fff; color: #bbb;
  border: 1.5px solid #eee; border-radius: 18px;
  font-size: 17px; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.hint {
  text-align: center; font-size: 13px; color: #e0a0b0;
  margin-bottom: 0.75rem;
  font-family: 'Noto Sans KR', sans-serif;
}

/* 화면 전환 */
.screen { display: none; }
.screen.active { display: block; }

/* 감사 화면 */
.ty { text-align: center; padding: 0.5rem 0; }
.ty-big { font-size: 64px; display: block; margin-bottom: 1rem; animation: pop 0.5s cubic-bezier(.175,.885,.32,1.275); }
@keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.ty-title {
  font-size: 26px; color: #2f9e44; margin-bottom: 0.5rem;
  font-family: 'Cafe24 Ssurround Air', 'Noto Sans KR', sans-serif;
}
.ty-msg {
  font-size: 16px; color: #999; line-height: 1.9; margin-bottom: 1.5rem;
  font-family: 'Cafe24 Ssurround Air', 'Noto Sans KR', sans-serif;
}
.ty-people {
  font-size: 15px; color: #e07090; margin-bottom: 1.25rem;
  background: #fff0f3; border-radius: 12px; padding: 10px;
  font-family: 'Cafe24 Ssurround Air', 'Noto Sans KR', sans-serif;
}
.count-box { background: #f0fff4; border-radius: 16px; padding: 1.25rem; border: 1px solid #b2f2bb; }
.count-label {
  font-size: 13px; color: #888; margin-bottom: 6px;
  font-family: 'Noto Sans KR', sans-serif;
}
.count-num {
  font-size: 48px; font-weight: 800; color: #2f9e44;
  font-family: 'Cafe24 Ssurround Air', 'Noto Sans KR', sans-serif;
}
.count-unit { font-size: 16px; color: #666; }

/* 불참 화면 */
.sorry { text-align: center; padding: 0.5rem 0; }
.sorry-big { font-size: 56px; display: block; margin-bottom: 1rem; }
.sorry-title {
  font-size: 22px; color: #8b2252; margin-bottom: 0.5rem;
  font-family: 'Cafe24 Ssurround Air', 'Noto Sans KR', sans-serif;
}
.sorry-msg {
  font-size: 15px; color: #bbb; line-height: 1.9; margin-bottom: 1.5rem;
  font-family: 'Cafe24 Ssurround Air', 'Noto Sans KR', sans-serif;
}
.btn-back {
  background: none; border: 1.5px solid #ffd0da;
  border-radius: 12px; padding: 10px 24px;
  font-size: 14px; color: #cca0b0; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
</style>
</head>
<body>

<div class="petals" id="petals"></div>

<div class="card">
  <div class="header">
    <span class="header-icon">🌸</span>
    <p class="header-deco">✦ 칠순 잔치 초대 ✦</p>
    <p class="header-name">박정자 여사님</p>
    <p class="header-title">일흔 번째 봄을 맞이하며</p>
    <span class="header-bday">🎂 생신 6월 19일</span>
  </div>

  <div class="body">

    <!-- 메인 화면 -->
    <div id="screen-main" class="screen active">
      <div class="poem">
봄꽃처럼 환하게 살아오신<br>
칠십 년의 세월을<br>
함께 축하해 주세요 🌷
      </div>

      <div class="info-wrap">
        <div class="info-item"><span class="info-emoji">📅</span><div class="info-text"><b>6월 14일 토요일</b></div></div>
        <div class="info-item"><span class="info-emoji">🕛</span><div class="info-text"><b>낮 12시</b> 점심 식사</div></div>
        <div class="info-item"><span class="info-emoji">📍</span><div class="info-text"><b>서산 미다옴</b></div></div>
      </div>

      <p class="q-text">함께해 주실 수 있으신가요?</p>
      <p class="q-sub">몇 분이 오시는지 눌러주세요 😊</p>

      <div class="count-select">
        <button onclick="selectCount(1, this)"><span class="cnt-icon">🙋</span>혼자 갈게요</button>
        <button onclick="selectCount(2, this)"><span class="cnt-icon">👫</span>둘이 갈게요</button>
        <button onclick="selectCount(3, this)"><span class="cnt-icon">👨‍👩‍👦</span>셋이 갈게요</button>
        <button onclick="selectCount(4, this)"><span class="cnt-icon">👨‍👩‍👧‍👦</span>넷이 갈게요</button>
      </div>

      <p class="hint" id="hint-text">인원을 선택하면 참석 버튼이 활성화돼요</p>

      <button class="btn-sound" onclick="speak(mainText)"><span>🔊</span><span>눌러서 안내 듣기</span></button>
      <button class="btn-yes" id="btn-yes" onclick="rsvpYes()"><span>✅</span><span id="yes-label">참석할게요!</span></button>
      <button class="btn-no" onclick="rsvpNo()"><span>😢</span><span>아쉽지만 못 갑니다</span></button>
    </div>

    <!-- 감사 화면 -->
    <div id="screen-yes" class="screen">
      <div class="ty">
        <span class="ty-big">🌸</span>
        <p class="ty-title">고맙습니다!</p>
        <p class="ty-msg">6월 14일 토요일 낮 12시<br>서산 미다옴에서 뵙겠습니다 💕</p>
        <p class="ty-people" id="ty-people"></p>
        <div class="count-box">
          <p class="count-label">지금까지 참석 확인하신 분</p>
          <span class="count-num" id="yes-count">-</span><span class="count-unit"> 명</span>
        </div>
      </div>
    </div>

    <!-- 불참 화면 -->
    <div id="screen-no" class="screen">
      <div class="sorry">
        <span class="sorry-big">🙏</span>
        <p class="sorry-title">알려주셔서 감사해요</p>
        <p class="sorry-msg">아쉽지만<br>마음만으로도 충분합니다 🌸</p>
        <button class="btn-back" onclick="goBack()">← 다시 선택하기</button>
      </div>
    </div>

  </div>
</div>

<script>
// 꽃잎 생성
const petalsEl = document.getElementById('petals');
['🌸','🌺','🌷','🌼'].forEach(p => {
  for (let j = 0; j < 4; j++) {
    const el = document.createElement('div');
    el.className = 'petal';
    el.textContent = p;
    el.style.left = Math.random() * 100 + '%';
    el.style.animationDuration = (6 + Math.random() * 8) + 's';
    el.style.animationDelay = (Math.random() * 12) + 's';
    el.style.fontSize = (14 + Math.random() * 14) + 'px';
    petalsEl.appendChild(el);
  }
});

// 음성 안내
const mainText = "박정자 여사님 칠순 잔치에 초대합니다. 6월 14일 토요일 낮 12시, 서산 미다옴에서 점심 식사를 함께할 예정입니다. 몇 분이 오실지 버튼을 눌러 선택하신 후, 초록색 참석 버튼을 눌러주세요.";

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = 0.88; u.pitch = 1.05;
  window.speechSynthesis.speak(u);
}

// 인원 선택
let selectedCount = 0;
const countLabels = { 1: '혼자', 2: '둘이', 3: '셋이', 4: '넷이' };

function selectCount(n, btn) {
  document.querySelectorAll('.count-select button').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCount = n;
  document.getElementById('yes-label').textContent = countLabels[n] + ' 갈게요!';
  document.getElementById('btn-yes').classList.add('enabled');
  document.getElementById('hint-text').style.display = 'none';
}

// 스토리지
const KEY = 'rsvp_jungja_v2';
async function getCount() {
  try { const r = await window.storage.get(KEY, true); return r ? parseInt(r.value)||0 : 0; } catch { return 0; }
}
async function incrementCount(n) {
  const c = await getCount();
  const next = c + n;
  try { await window.storage.set(KEY, String(next), true); } catch {}
  return next;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function rsvpYes() {
  if (!selectedCount) return;
  const total = await incrementCount(selectedCount);
  document.getElementById('yes-count').textContent = total;
  document.getElementById('ty-people').textContent = '🎀 ' + countLabels[selectedCount] + ' 참석으로 확인됐어요!';
  showScreen('screen-yes');
  speak("감사합니다! " + countLabels[selectedCount] + " 오시는군요. 6월 14일 토요일 낮 12시, 서산 미다옴에서 뵙겠습니다.");
}

function rsvpNo() {
  showScreen('screen-no');
  speak("알려주셔서 감사합니다. 아쉽지만 마음만으로도 충분합니다.");
}

function goBack() {
  selectedCount = 0;
  document.querySelectorAll('.count-select button').forEach(b => b.classList.remove('selected'));
  document.getElementById('btn-yes').classList.remove('enabled');
  document.getElementById('yes-label').textContent = '참석할게요!';
  document.getElementById('hint-text').style.display = '';
  showScreen('screen-main');
}
</script>
</body>
</html>
